spring.application.name=cruddemo
spring.config.import=optional:file:.env[.properties],optional:file:Backend/.env[.properties]

#JDBC PROPERTIES

spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3307/serviceconnect}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
#spring date REST Properties

# spring.data.rest.base-path=/api
spring.data.rest.default-page-size=20

spring.ai.ollama.chat.options.model=llama3
spring.ai.ollama.base-url=http://localhost:11434
logging.level.org.springframework.web=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

spring.security.user.name=${SPRING_SECURITY_USER_NAME:admin}
spring.security.user.password=${SPRING_SECURITY_USER_PASSWORD}

spring.main.banner-mode=off
logging.level.root=warn

jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION_MS:432000000}
app.cors.allowed-origins=http://localhost:5173

# Google OAuth configuration
google.oauth.client-id=${GOOGLE_OAUTH_CLIENT_ID}
google.oauth.client-secret=${GOOGLE_OAUTH_CLIENT_SECRET}
google.oauth.redirect-uri=${GOOGLE_OAUTH_REDIRECT_URI:http://localhost:5173/auth/google/callback}


cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME}
cloudinary.api-key=${CLOUDINARY_API_KEY}
cloudinary.api-secret=${CLOUDINARY_API_SECRET}

spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB
